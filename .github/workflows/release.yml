name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  package:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="manual-${GITHUB_RUN_NUMBER}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "archive=syrogo_${TAG}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build archive
        shell: bash
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BIN_DIR="dist/syrogo_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$BIN_DIR"
          go build -trimpath -ldflags "-X main.version=${{ steps.meta.outputs.tag }}" -o "$BIN_DIR/syrogo" ./cmd/syrogo
          cp README.md LICENSE "$BIN_DIR/"
          tar -C dist -czf "dist/${{ steps.meta.outputs.archive }}" "syrogo_${{ matrix.goos }}_${{ matrix.goarch }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.archive }}
          path: dist/${{ steps.meta.outputs.archive }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum syrogo_*.tar.gz > "syrogo_${GITHUB_REF_NAME}_checksums.txt"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/syrogo_*.tar.gz
            dist/syrogo_${{ github.ref_name }}_checksums.txt
