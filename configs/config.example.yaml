listeners:
  - name: "public-http"
    listen: ":8080"
    inbounds:
      - "openai-entry"
      - "responses-entry"
      - "anthropic-entry"

inbounds:
  - name: "openai-entry"
    protocol: "openai_chat"
    path: "/v1/chat/completions"
    clients:
      - token: "${SYROGO_OPENAI_CLIENT_TOKEN}"
        tag: "office"
      - token: "${SYROGO_MOBILE_CLIENT_TOKEN}"
        tag: "mobile"

  - name: "responses-entry"
    protocol: "openai_responses"
    path: "/v1/responses"
    clients:
      - token: "${SYROGO_RESPONSES_CLIENT_TOKEN}"
        tag: "responses"

  - name: "anthropic-entry"
    protocol: "anthropic_messages"
    path: "/v1/messages"
    clients:
      - token: "${SYROGO_ANTHROPIC_CLIENT_TOKEN}"
        tag: "anthropic-to-responses"

routing:
  rules:
    - name: "office-route"
      from_tags:
        - "office"
      to_tags:
        - "openai-primary"
        - "openai-backup"
      strategy: "failover"
      target_model: "gpt-4o-mini"

    - name: "mobile-route"
      from_tags:
        - "mobile"
      to_tags:
        - "openai-primary"
        - "openai-backup"
      strategy: "round_robin"

    - name: "responses-route"
      from_tags:
        - "responses"
      to_tags:
        - "responses-primary"
      strategy: "failover"

    - name: "anthropic-to-responses-route"
      from_tags:
        - "anthropic-to-responses"
      to_tags:
        - "responses-primary"
      strategy: "failover"
      target_model: "gpt-5.4"

outbounds:
  - name: "mock"
    protocol: "mock"
    tag: "mock-primary"

  - name: "openai-primary"
    protocol: "openai_chat"
    endpoint: "https://api.openai.com/v1"
    auth_token: "${OPENAI_API_KEY_PRIMARY}"
    tag: "openai-primary"

  - name: "openai-backup"
    protocol: "openai_chat"
    endpoint: "https://api.openai.com/v1"
    auth_token: "${OPENAI_API_KEY_BACKUP}"
    tag: "openai-backup"

  - name: "responses-primary"
    protocol: "openai_responses"
    endpoint: "https://api.openai.com/v1"
    auth_token: "${OPENAI_RESPONSES_API_KEY_PRIMARY}"
    tag: "responses-primary"
    # Optional provider-specific Responses compatibility overrides.
    # Example for a partially compatible upstream:
    # capabilities:
    #   responses_previous_response_id: false
    #   responses_builtin_tools: false
    #   responses_tool_result_status_error: false
    #   responses_assistant_history_native: false

  - name: "anthropic-primary"
    protocol: "anthropic_messages"
    endpoint: "https://example-anthropic-compatible.local/v1"
    auth_token: "${ANTHROPIC_API_KEY_PRIMARY}"
    tag: "anthropic-primary"
