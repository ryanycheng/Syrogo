listeners:
  - name: "public-http"
    listen: ":8080"
    inbounds:
      - "openai-entry"

inbounds:
  - name: "openai-entry"
    protocol: "openai_chat"
    path: "/v1/chat/completions"
    clients:
      - token: "${SYROGO_CLIENT_TOKEN}"
        tag: "office"

routing:
  rules:
    - name: "office-route"
      from_tags:
        - "office"
      to_tags:
        - "mock-primary"
        - "openai-backup"
      strategy: "failover"
      target_model: "gpt-4o-mini"

outbounds:
  - name: "mock"
    protocol: "mock"
    tag: "mock-primary"

  - name: "openai"
    protocol: "openai_chat"
    endpoint: "https://api.openai.com/v1"
    auth_token: "${OPENAI_API_KEY_PRIMARY}"
    tag: "openai-backup"
