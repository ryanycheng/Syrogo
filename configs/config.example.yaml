listeners:
  - name: "public-http"
    listen: ":8080"
    inbounds:
      - "openai-entry"
      - "anthropic-entry"

inbounds:
  - name: "openai-entry"
    protocol: "openai_chat"
    path: "/v1/chat/completions"
    clients:
      - token: "${SYROGO_OPENAI_CLIENT_TOKEN}"
        tag: "office"
      - token: "${SYROGO_MOBILE_CLIENT_TOKEN}"
        tag: "mobile"

  - name: "anthropic-entry"
    protocol: "anthropic_messages"
    path: "/v1/messages"
    clients:
      - token: "${SYROGO_ANTHROPIC_CLIENT_TOKEN}"
        tag: "office"

routing:
  rules:
    - name: "office-route"
      from_tags:
        - "office"
      to_tags:
        - "openai-primary"
        - "openai-backup"
      strategy: "failover"
      target_model: "gpt-4o-mini"

    - name: "mobile-route"
      from_tags:
        - "mobile"
      to_tags:
        - "openai-primary"
        - "openai-backup"
      strategy: "round_robin"

outbounds:
  - name: "mock"
    protocol: "mock"
    tag: "mock-primary"

  - name: "openai-primary"
    protocol: "openai_chat"
    endpoint: "https://api.openai.com/v1"
    auth_token: "${OPENAI_API_KEY_PRIMARY}"
    tag: "openai-primary"

  - name: "openai-backup"
    protocol: "openai_chat"
    endpoint: "https://api.openai.com/v1"
    auth_token: "${OPENAI_API_KEY_BACKUP}"
    tag: "openai-backup"
